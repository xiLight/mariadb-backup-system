name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check all shell scripts
        run: |
          for f in *.sh lib/*.sh; do
            bash -n "$f" || exit 1
          done
          echo "All scripts pass bash -n"

      - name: ShellCheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error *.sh lib/*.sh

      - name: Validate compose files
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.cluster.yml config -q
          echo "Compose files valid"

  cluster-e2e:
    name: Cluster E2E (init, backup, verify, restore, failover)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^STACK_NAME=.*/STACK_NAME=ci/' .env
          sed -i 's/your_secure_root_password_here/CiRootPass12345/' .env
          sed -i 's/your_secure_app_password_here/CiAppPass12345/' .env
          sed -i 's/db1_password/CiDb1Pass12345/' .env
          sed -i 's/db2_password/CiDb2Pass12345/' .env
          sed -i 's/db3_password/CiDb3Pass12345/' .env
          sed -i 's/db4_password/CiDb4Pass12345/' .env
          sed -i 's/db5_password/CiDb5Pass12345/' .env
          # CI runner has nothing on 3306/3309/3316/8404
          docker network create web
          chmod +x *.sh lib/*.sh

      - name: Initialize 3-node Galera cluster
        run: ./cluster.sh init

      - name: Cluster status must be 3/3 synced
        run: |
          ./cluster.sh status
          source .env; source lib/logging.sh; source lib/cluster.sh
          [ "$(cluster_healthy_count)" = "3" ]

      - name: Insert test data
        run: |
          source .env
          docker exec -e MYSQL_PWD="$MARIADB_ROOT_PASSWORD" ci-node1 mariadb -u root -e "
            CREATE DATABASE cidb;
            CREATE TABLE cidb.t (id INT PRIMARY KEY, v VARCHAR(64));
            INSERT INTO cidb.t VALUES (1,'hello'),(2,'world');"
          # Data must replicate to the other nodes synchronously
          docker exec -e MYSQL_PWD="$MARIADB_ROOT_PASSWORD" ci-node3 mariadb -u root -N -e \
            "SELECT COUNT(*) FROM cidb.t;" | grep -qx 2

      - name: Full backup with verification
        run: ./backup.sh --full --include-empty --verify

      - name: Verify all backups
        run: ./verify_backup.sh

      - name: Restore test in throwaway container
        run: ./restore_test.sh --database cidb

      - name: Failover drill
        run: |
          source .env; source lib/logging.sh; source lib/cluster.sh
          docker stop ci-node1
          sleep 20
          # Cluster must stay primary with 2 nodes; reads/writes keep working
          docker exec -e MYSQL_PWD="$MARIADB_ROOT_PASSWORD" ci-node2 mariadb -u root -N -e \
            "SELECT COUNT(*) FROM cidb.t;" | grep -qx 2
          [ "$(cluster_healthy_count)" = "2" ]
          docker start ci-node1
          wait_node_synced node1 300

      - name: Self-healing check
        run: ./heal.sh

      - name: Show logs on failure
        if: failure()
        run: |
          for c in ci-node1 ci-node2 ci-node3 ci-haproxy; do
            echo "=== $c ==="; docker logs --tail 50 "$c" 2>&1 || true
          done
          tail -50 logs/*.log 2>/dev/null || true
