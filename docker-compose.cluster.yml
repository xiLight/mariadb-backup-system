# STACK_NAME (from .env) makes every name unique per stack instance:
# project name, container names, image tag - so multiple installations
# can run on the same host without collisions.
# Internal service DNS (node1/node2/node3) is scoped to this project's
# galera network; only HAProxy joins the shared 'web' network. Apps
# connect to ${STACK_NAME}-haproxy (or the published HAPROXY_PORT).
name: ${STACK_NAME:-mariadb}-cluster

x-node-common: &node-common
  image: ${STACK_NAME:-mariadb}-galera:local
  restart: unless-stopped
  networks:
    - galera
  healthcheck:
    test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
    interval: 15s
    timeout: 10s
    start_period: 120s
    retries: 3
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-node-env: &node-env
  MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
  MARIADB_ROOT_REMOTE: ${MARIADB_ROOT_REMOTE:-yes}
  MARIADB_DATABASE1: ${MARIADB_DATABASE1}
  MARIADB_DATABASE2: ${MARIADB_DATABASE2}
  MARIADB_DATABASE3: ${MARIADB_DATABASE3}
  MARIADB_DATABASE4: ${MARIADB_DATABASE4}
  MARIADB_DATABASE5: ${MARIADB_DATABASE5}
  MARIADB_USER: ${MARIADB_USER}
  MARIADB_PASSWORD: ${MARIADB_PASSWORD}
  DATABASE1_PASSWORD: ${DATABASE1_PASSWORD}
  DATABASE2_PASSWORD: ${DATABASE2_PASSWORD}
  DATABASE3_PASSWORD: ${DATABASE3_PASSWORD}
  DATABASE4_PASSWORD: ${DATABASE4_PASSWORD}
  DATABASE5_PASSWORD: ${DATABASE5_PASSWORD}
  TZ: ${TZ:-Europe/Berlin}
  GALERA_ENABLED: "yes"
  GALERA_CLUSTER_NAME: ${GALERA_CLUSTER_NAME:-mariadb-galera}
  GALERA_CLUSTER_ADDRESS: gcomm://node1,node2,node3
  GALERA_SST_METHOD: ${GALERA_SST_METHOD:-mariabackup}

services:
  node1:
    <<: *node-common
    build:
      context: .
      dockerfile: Dockerfile.mariadb
    container_name: ${STACK_NAME:-mariadb}-node1
    environment:
      <<: *node-env
      GALERA_NODE_ID: "1"
      GALERA_NODE_NAME: node1
      GALERA_NODE_ADDRESS: node1
    volumes:
      - ./cluster_data/node1:/var/lib/mysql
      - ./my_custom.cnf:/etc/mysql/conf.d/my_custom.cnf:ro
      - ./galera.cnf.template:/etc/mysql/galera.cnf.template:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./lib:/usr/local/lib:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

  node2:
    <<: *node-common
    container_name: ${STACK_NAME:-mariadb}-node2
    depends_on:
      - node1
    environment:
      <<: *node-env
      GALERA_NODE_ID: "2"
      GALERA_NODE_NAME: node2
      GALERA_NODE_ADDRESS: node2
    volumes:
      - ./cluster_data/node2:/var/lib/mysql
      - ./my_custom.cnf:/etc/mysql/conf.d/my_custom.cnf:ro
      - ./galera.cnf.template:/etc/mysql/galera.cnf.template:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./lib:/usr/local/lib:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

  node3:
    <<: *node-common
    container_name: ${STACK_NAME:-mariadb}-node3
    depends_on:
      - node1
    environment:
      <<: *node-env
      GALERA_NODE_ID: "3"
      GALERA_NODE_NAME: node3
      GALERA_NODE_ADDRESS: node3
    volumes:
      - ./cluster_data/node3:/var/lib/mysql
      - ./my_custom.cnf:/etc/mysql/conf.d/my_custom.cnf:ro
      - ./galera.cnf.template:/etc/mysql/galera.cnf.template:ro
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./lib:/usr/local/lib:ro
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

  haproxy:
    image: haproxy:2.9-alpine
    container_name: ${STACK_NAME:-mariadb}-haproxy
    restart: unless-stopped
    # The official image runs unprivileged since 2.4 and cannot read the
    # root-owned TLS certs (mode 600) - running as root inside the
    # container beats making the private key world-readable on the host
    user: root
    ports:
      - "${MARIADB_BIND_IP:-0.0.0.0}:${HAPROXY_PORT:-3306}:3306"
      # Read-only round-robin across all nodes (read scaling)
      - "${MARIADB_BIND_IP:-0.0.0.0}:${HAPROXY_READ_PORT:-3309}:3307"
      # TLS listener (active after ./tls_setup.sh)
      - "${MARIADB_BIND_IP:-0.0.0.0}:${HAPROXY_TLS_PORT:-3316}:3316"
      # Stats page shows cluster internals - localhost only by default,
      # reach it remotely via SSH tunnel or set HAPROXY_STATS_BIND_IP
      - "${HAPROXY_STATS_BIND_IP:-127.0.0.1}:${HAPROXY_STATS_PORT:-8404}:8404"
    volumes:
      # Directory instead of a single file: haproxy -f <dir> loads all
      # files lexically. 00-main.cfg is tracked in git; 10-tls.cfg is
      # written by tls_setup.sh and untracked - so runtime changes never
      # dirty the git working tree (would block git pull / update.sh).
      - ./haproxy.d:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./tls:/usr/local/etc/haproxy/tls:ro
    networks:
      - galera
      - web
    depends_on:
      - node1
      - node2
      - node3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  galera:
    driver: bridge
    ipam:
      config:
        - subnet: ${GALERA_SUBNET:-172.28.66.0/24}
  web:
    external: true
