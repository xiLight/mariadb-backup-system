global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 630s
    timeout server 630s

# All writes go to node1; node2/node3 are hot standbys ("backup").
# Sending writes to a single Galera node at a time avoids certification
# conflicts. If node1 fails its health check, HAProxy fails over to
# node2, then node3 - and back to node1 once it is healthy again.
listen mariadb
    bind *:3306
    option mysql-check user haproxy_check
    default-server inter 3s fall 3 rise 2
    server node1 node1:3306 check
    server node2 node2:3306 check backup
    server node3 node3:3306 check backup

# Read-only listener: round-robin across ALL nodes for read scaling.
# Use for SELECT-heavy workloads; writes belong on the main port.
listen mariadb-read
    bind *:3307
    balance roundrobin
    option mysql-check user haproxy_check
    default-server inter 3s fall 3 rise 2
    server node1 node1:3306 check
    server node2 node2:3306 check
    server node3 node3:3306 check

# TLS listener - enabled by ./tls_setup.sh (generates certs into ./tls
# and uncomments this block). Terminates TLS here; traffic to the nodes
# stays on the isolated galera network.
#listen mariadb-tls
#    bind *:3316 ssl crt /usr/local/etc/haproxy/tls/server.pem
#    option mysql-check user haproxy_check
#    default-server inter 3s fall 3 rise 2
#    server node1 node1:3306 check
#    server node2 node2:3306 check backup
#    server node3 node3:3306 check backup

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /
    stats refresh 5s
